# ─── Server ──────────────────────────────────────────────────────────────────
server.port=8080
server.ssl.enabled=false

# ─── Application ─────────────────────────────────────────────────────────────
spring.application.name=family-league

# ─── Datasource ──────────────────────────────────────────────────────────────
# Production: set DB_URL, DB_USERNAME, DB_PASSWORD env vars.
# Defaults below are local-dev only — do NOT commit real credentials here.
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/family-league}
spring.datasource.username=${DB_USERNAME:abhilash}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ─── JPA / Hibernate ─────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=public

# ─── Flyway ──────────────────────────────────────────────────────────────────
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false
spring.flyway.validate-on-migrate=true

# ─── JWT ─────────────────────────────────────────────────────────────────────
# Production: set JWT_SECRET env var (256-bit hex). Default is local-dev only.
app.jwt.secret=${JWT_SECRET:725fce438c9a5edf234550dd378d90bdcbef6b7dd53f41a9f1c32e3ed7e356bd}
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ─── Prediction lock windows ─────────────────────────────────────────────────
app.prediction.match-lock-hours=1
app.prediction.league-lock-hours=4

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.root=INFO
logging.level.com.familyleague=DEBUG
logging.level.org.hibernate.SQL=WARN
logging.level.org.flywaydb=INFO
logging.file.name=logs/family-league.log
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# ─── SpringDoc / OpenAPI ─────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=alpha

# ─── Actuator ────────────────────────────────────────────────────────────────
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.show-details=always
